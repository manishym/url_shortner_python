name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, deploy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest images
        run: |
          docker compose pull

      - name: Restart services
        run: |
          docker compose up -d --build
