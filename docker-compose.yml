services:
  redpanda:
    image: redpandadata/redpanda:v24.3.5
    command: redpanda start --smp 1 --memory 1G --reserve-memory 0M --overprovisioned --node-id 0 --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092 --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  id-service:
    build: ./id_service
    environment:
      WORKER_ID: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/generate')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  shortener-service:
    build:
      context: .
      dockerfile: shortener_service/Dockerfile
    environment:
      ID_SERVICE_URL: http://id-service:8000
      DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      id-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  redirection-service:
    build:
      context: .
      dockerfile: redirection_service/Dockerfile
    environment:
      DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP: redpanda:9092
      PURGE_TOPIC: url-purge-events
      LRU_MAX_SIZE: "10000"
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  deletion-service:
    build:
      context: .
      dockerfile: deletion_service/Dockerfile
    environment:
      DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP: redpanda:9092
      PURGE_TOPIC: url-purge-events
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/static:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    depends_on:
      - shortener-service
      - redirection-service
      - deletion-service
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
