events {
    worker_connections 1024;
}

http {
    # upstream backends
    upstream shortener_backend {
        server shortener-service:8000;
    }

    upstream redirection_backend {
        server redirection-service:8000;
    }

    upstream deletion_backend {
        server deletion-service:8000;
    }

    # Map DELETE requests to deletion backend, others to redirection
    map $request_method $target_backend {
        DELETE  deletion_backend;
        default redirection_backend;
    }

    server {
        listen 80;
        server_name _;

        # Health endpoints
        location /health {
            return 200 '{"status":"ok"}\n';
            add_header Content-Type application/json;
        }

        # Shorten endpoint -> shortener service
        location /shorten {
            proxy_pass http://shortener_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /r/ path routing based on HTTP method
        location /r/ {
            # Use $target_backend which maps DELETE to deletion, GET to redirection
            proxy_pass http://$target_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static frontend at root
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
