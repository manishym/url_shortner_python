<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener — Premium SaaS</title>
  <link rel="icon" type="image/png" href="/zql.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #030303;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(255, 255, 255, 0.2);
      --text: #f5f5f7;
      --text-muted: #86868b;
      --accent: #ffffff;
      --accent-bg: #ffffff;
      --accent-text: #000000;
      --danger: #ff453a;
      --success: #32d74b;
      --glass: blur(12px) saturate(180%);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 50% -20%, rgba(120, 119, 198, 0.15), transparent),
        radial-gradient(circle at 0% 100%, rgba(120, 119, 198, 0.05), transparent);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 560px;
      opacity: 0;
      transform: translateY(20px);
      animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .header img {
      height: 64px;
      width: auto;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0;
      background: linear-gradient(to bottom, #fff, #a1a1a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-top: 0.75rem;
      max-width: 400px;
      line-height: 1.5;
    }

    .card {
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 2rem;
      transition: var(--transition);
    }

    .card:hover {
      border-color: var(--border-focus);
      background: var(--surface-hover);
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 0 0 1.5rem 0;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    input[type="url"],
    input[type="text"],
    input[type="datetime-local"] {
      width: 100%;
      padding: 1rem 1.25rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      transition: var(--transition);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
    }

    /* Custom Datetime Styling */
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.5;
      cursor: pointer;
      transition: var(--transition);
    }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }

    .btn-primary {
      width: 100%;
      background: var(--accent-bg);
      color: var(--accent-text);
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      padding: 1rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
      background: #f0f0f0;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-danger {
      width: 100%;
      background: transparent;
      color: var(--danger);
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 69, 58, 0.2);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-danger:hover {
      background: rgba(255, 69, 58, 0.1);
      border-color: var(--danger);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-family: inherit;
      font-weight: 500;
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--border-focus);
    }

    .result {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      border: 1px solid var(--border);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .result-row + .result-row {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .result-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      overflow: hidden;
    }

    .result-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .short-url {
      font-family: "JetBrains Mono", monospace;
      font-size: 1rem;
      color: var(--text);
      word-break: break-all;
    }

    .short-url a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }

    .short-url a:hover {
      border-color: var(--accent);
    }

    .message {
      font-size: 0.875rem;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      text-align: center;
    }

    .message.error {
      background: rgba(255, 69, 58, 0.1);
      color: var(--danger);
      border: 1px solid rgba(255, 69, 58, 0.2);
    }

    .message.success {
      background: rgba(50, 215, 75, 0.1);
      color: var(--success);
      border: 1px solid rgba(50, 215, 75, 0.2);
    }

    .field-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      line-height: 1.4;
    }

    .hidden { display: none !important; }

    footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
    }

    footer a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
    }

    footer code {
      background: var(--surface);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: "JetBrains Mono", monospace;
    }

    /* Loading Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      body { padding: 2rem 1rem; }
      h1 { font-size: 2rem; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="/zql.png" alt="zql.app logo" />
      <h1>URL Shortener</h1>
      <p class="subtitle">Distributed infrastructure demo featuring Snowflake IDs, Redis, Postgres, and Redpanda.</p>
    </header>

    <main>
      <div class="card">
        <h2>Shorten a URL</h2>
        <div class="input-group">
          <label for="long-url">Destination URL</label>
          <input type="url" id="long-url" placeholder="https://example.com/very/long/path" />
        </div>

        <div class="input-group">
          <label for="expires-at">Expiration (Optional)</label>
          <input type="datetime-local" id="expires-at" />
          <p id="expires-hint" class="field-hint">Leave empty for a permanent link. Select a date/time to set an automatic expiry.</p>
        </div>

        <button type="button" class="btn-primary" id="shorten-btn">
          <span>Shorten</span>
        </button>

        <div id="shorten-message" class="message hidden"></div>

        <div id="shorten-result" class="result hidden">
          <div class="result-row">
            <div class="result-info">
              <span class="result-label">Short URL</span>
              <span class="short-url" id="short-url-display"></span>
            </div>
            <button type="button" class="btn-ghost copy-btn" id="copy-btn">Copy</button>
          </div>
          <div class="result-row">
            <div class="result-info">
              <span class="result-label">Delete Key</span>
              <span class="short-url" id="delete-key-display" style="font-size: 0.85rem; opacity: 0.8;"></span>
            </div>
            <button type="button" class="btn-ghost copy-btn" id="copy-key-btn">Copy Key</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Manage Link</h2>
        <div class="input-group">
          <label for="delete-path">Short Code</label>
          <input type="text" id="delete-path" placeholder="e.g. abc1234" />
        </div>
        <div class="input-group">
          <label for="delete-key">Delete Key</label>
          <input type="text" id="delete-key" placeholder="Enter the key provided during creation" />
        </div>
        <button type="button" class="btn-danger" id="delete-btn">Delete Link</button>
        <div id="delete-message" class="message hidden"></div>
      </div>
    </main>

    <footer>
      <p>
        <a href="/docs">API Documentation</a> ·
        Redirects via <code>/r/{code}</code>
      </p>
    </footer>
  </div>

  <script>
    const base = window.location.origin;
    let lastShortPath = '';
    let lastDeleteKey = '';

    function showMessage(elId, text, type) {
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = 'message ' + (type === 'error' ? 'error' : 'success');
      el.classList.remove('hidden');
    }

    function hideMessage(elId) {
      document.getElementById(elId).classList.add('hidden');
    }

    function animateCopied(button) {
      const orig = button.textContent;
      button.textContent = 'Copied!';
      button.style.borderColor = 'var(--success)';
      button.style.color = 'var(--success)';
      setTimeout(() => {
        button.textContent = orig;
        button.style.borderColor = '';
        button.style.color = '';
      }, 2000);
    }

    function setBtnLoading(btnId, isLoading, text) {
      const btn = document.getElementById(btnId);
      const span = btn.querySelector('span');
      if (isLoading) {
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span>' + text + '</span>';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<span>' + text + '</span>';
      }
    }

    document.getElementById('shorten-btn').addEventListener('click', async () => {
      const input = document.getElementById('long-url');
      const url = (input.value || '').trim();
      if (!url) {
        showMessage('shorten-message', 'Please enter a URL.', 'error');
        return;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showMessage('shorten-message', 'URL must start with http:// or https://', 'error');
        return;
      }
      hideMessage('shorten-message');
      document.getElementById('shorten-result').classList.add('hidden');

      setBtnLoading('shorten-btn', true, 'Shortening...');

      const expiresInput = document.getElementById('expires-at');
      const body = { long_url: url };
      if (expiresInput.value) {
        const expiresDate = new Date(expiresInput.value);
        const now = new Date();
        const seconds = Math.floor((expiresDate - now) / 1000);
        if (seconds > 0) body.expires_in_seconds = seconds;
      }

      try {
        const res = await fetch(base + '/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          showMessage('shorten-message', data.detail || data.error || 'Failed to shorten', 'error');
          return;
        }
        lastShortPath = data.short_path;
        lastDeleteKey = data.delete_key;
        const shortFull = base + '/r/' + data.short_path;
        const displayEl = document.getElementById('short-url-display');
        displayEl.replaceChildren();
        const linkEl = document.createElement('a');
        linkEl.href = shortFull;
        linkEl.target = '_blank';
        linkEl.rel = 'noopener';
        linkEl.textContent = shortFull;
        displayEl.appendChild(linkEl);
        document.getElementById('delete-key-display').textContent = data.delete_key;
        document.getElementById('shorten-result').classList.remove('hidden');
        document.getElementById('delete-path').value = data.short_path;
        document.getElementById('delete-key').value = data.delete_key;
        showMessage('shorten-message', 'Link created successfully.', 'success');
      } catch (e) {
        showMessage('shorten-message', 'Network error: ' + e.message, 'error');
      } finally {
        setBtnLoading('shorten-btn', false, 'Shorten');
      }
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      const link = document.querySelector('#short-url-display a');
      if (!link) return;
      const url = link.href;
      navigator.clipboard.writeText(url).then(() => {
        animateCopied(document.getElementById('copy-btn'));
      }).catch(err => console.error('Failed to copy URL:', err));
    });

    document.getElementById('copy-key-btn').addEventListener('click', () => {
      if (!lastDeleteKey) return;
      navigator.clipboard.writeText(lastDeleteKey).then(() => {
        animateCopied(document.getElementById('copy-key-btn'));
      }).catch(err => console.error('Failed to copy delete key:', err));
    });

    document.getElementById('delete-btn').addEventListener('click', async () => {
      const path = (document.getElementById('delete-path').value || '').trim().replace(/^\/r\//, '').split('/')[0];
      const key = (document.getElementById('delete-key').value || '').trim();
      if (!path) {
        showMessage('delete-message', 'Enter a short code to delete.', 'error');
        return;
      }
      if (!key) {
        showMessage('delete-message', 'Enter the delete key.', 'error');
        return;
      }
      hideMessage('delete-message');

      const btn = document.getElementById('delete-btn');
      const origText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      try {
        const res = await fetch(base + '/r/' + encodeURIComponent(path) + '?delete_key=' + encodeURIComponent(key), { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) {
          showMessage('delete-message', data.detail || 'Delete failed', 'error');
          return;
        }
        showMessage('delete-message', 'Link deleted successfully.', 'success');
        document.getElementById('delete-path').value = '';
        document.getElementById('delete-key').value = '';
        lastShortPath = '';
        lastDeleteKey = '';
      } catch (e) {
        showMessage('delete-message', 'Network error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = origText;
      }
    });
  </script>
</body>
</html>
