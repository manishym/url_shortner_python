<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a2e;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #22d3ee;
      --accent-dim: #0891b2;
      --danger: #f43f5e;
      --success: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container {
      width: 100%;
      max-width: 520px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 0 0 1rem 0;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }
    input[type="url"],
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      margin-bottom: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15);
    }
    button {
      font-family: "DM Sans", system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-danger:hover { background: rgba(244, 63, 94, 0.15); }
    .result {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .result-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .short-url {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      color: var(--accent);
      word-break: break-all;
    }
    .short-url a { color: var(--accent); text-decoration: none; }
    .short-url a:hover { text-decoration: underline; }
    .copy-btn {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
    }
    .message {
      font-size: 0.875rem;
      padding: 0.5rem 0;
      border-radius: 6px;
    }
    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }
    .field-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin: -0.5rem 0 1rem 0;
    }
    .hidden { display: none !important; }
    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>
    <p class="subtitle">Distributed demo — Snowflake IDs, Redis, Postgres, Redpanda</p>

    <div class="card">
      <h2>Shorten a URL</h2>
      <label for="long-url">Paste your long URL</label>
      <input type="url" id="long-url" placeholder="https://example.com/very/long/path" />
      <label for="expires-in">Expiry (optional)</label>
      <input type="number" id="expires-in" placeholder="Seconds until link expires (e.g. 60, 300); leave empty for no expiry" min="1" aria-describedby="expires-hint" />
      <p id="expires-hint" class="field-hint">Leave empty for no expiry. If set, link stops working after this many seconds (max cache 5 min).</p>
      <button type="button" class="btn-primary" id="shorten-btn">Shorten</button>
      <div id="shorten-message" class="message hidden"></div>
      <div id="shorten-result" class="result hidden">
        <div class="result-row">
          <span class="short-url" id="short-url-display"></span>
          <button type="button" class="btn-ghost copy-btn" id="copy-btn">Copy</button>
        </div>
        <div class="result-row" style="margin-top: 0.75rem;">
          <span style="color: var(--text-muted); font-size: 0.8rem;">Delete key:</span>
          <span class="short-url" id="delete-key-display" style="font-size: 0.8rem;"></span>
          <button type="button" class="btn-ghost copy-btn" id="copy-key-btn">Copy Key</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Delete a short link</h2>
      <label for="delete-path">Short code (e.g. abc1234)</label>
      <input type="text" id="delete-path" placeholder="abc1234" />
      <label for="delete-key">Delete key</label>
      <input type="text" id="delete-key" placeholder="Delete key from shorten response" />
      <button type="button" class="btn-danger" id="delete-btn">Delete</button>
      <div id="delete-message" class="message hidden"></div>
    </div>

    <footer>
      API: <a href="/docs">/docs</a> · Redirect: <code>/r/{code}</code>
    </footer>
  </div>

  <script>
    const base = window.location.origin;
    let lastShortPath = '';
    let lastDeleteKey = '';

    function showMessage(elId, text, type) {
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = 'message ' + (type === 'error' ? 'error' : 'success');
      el.classList.remove('hidden');
    }
    function hideMessage(elId) {
      document.getElementById(elId).classList.add('hidden');
    }

    document.getElementById('shorten-btn').addEventListener('click', async () => {
      const input = document.getElementById('long-url');
      const url = (input.value || '').trim();
      if (!url) {
        showMessage('shorten-message', 'Please enter a URL.', 'error');
        return;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showMessage('shorten-message', 'URL must start with http:// or https://', 'error');
        return;
      }
      hideMessage('shorten-message');
      document.getElementById('shorten-result').classList.add('hidden');
      const btn = document.getElementById('shorten-btn');
      btn.disabled = true;
      btn.textContent = 'Shortening…';
      const expiresVal = document.getElementById('expires-in').value.trim();
      const body = { long_url: url };
      if (expiresVal) {
        const sec = parseInt(expiresVal, 10);
        if (!isNaN(sec) && sec > 0) body.expires_in_seconds = sec;
      }
      try {
        const res = await fetch(base + '/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          showMessage('shorten-message', data.detail || data.error || 'Failed to shorten', 'error');
          return;
        }
        lastShortPath = data.short_path;
        lastDeleteKey = data.delete_key;
        const shortFull = base + '/r/' + data.short_path;
        document.getElementById('short-url-display').innerHTML =
          '<a href="' + shortFull + '" target="_blank" rel="noopener">' + shortFull + '</a>';
        document.getElementById('delete-key-display').textContent = data.delete_key;
        document.getElementById('shorten-result').classList.remove('hidden');
        document.getElementById('delete-path').value = data.short_path;
        document.getElementById('delete-key').value = data.delete_key;
        showMessage('shorten-message', 'Created. Save the delete key to delete this link.', 'success');
      } catch (e) {
        showMessage('shorten-message', 'Network error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Shorten';
      }
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      const link = document.querySelector('#short-url-display a');
      if (!link) return;
      const url = link.href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copy-btn');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      });
    });

    document.getElementById('copy-key-btn').addEventListener('click', () => {
      if (!lastDeleteKey) return;
      navigator.clipboard.writeText(lastDeleteKey).then(() => {
        const btn = document.getElementById('copy-key-btn');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      });
    });

    document.getElementById('delete-btn').addEventListener('click', async () => {
      const path = (document.getElementById('delete-path').value || '').trim().replace(/^\/r\//, '').split('/')[0];
      const key = (document.getElementById('delete-key').value || '').trim();
      if (!path) {
        showMessage('delete-message', 'Enter a short code to delete.', 'error');
        return;
      }
      if (!key) {
        showMessage('delete-message', 'Enter the delete key.', 'error');
        return;
      }
      hideMessage('delete-message');
      try {
        const res = await fetch(base + '/r/' + encodeURIComponent(path) + '?delete_key=' + encodeURIComponent(key), { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) {
          showMessage('delete-message', data.detail || 'Delete failed', 'error');
          return;
        }
        showMessage('delete-message', 'Deleted: ' + path + ' (cache purged via Redpanda)', 'success');
        document.getElementById('delete-path').value = '';
        document.getElementById('delete-key').value = '';
        lastShortPath = '';
        lastDeleteKey = '';
      } catch (e) {
        showMessage('delete-message', 'Network error: ' + e.message, 'error');
      }
    });
  </script>
</body>
</html>
